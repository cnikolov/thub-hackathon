<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" fill="none">
  <defs>
    <linearGradient id="int-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0fdfa"/>
      <stop offset="100%" stop-color="#fffbeb"/>
    </linearGradient>
    <linearGradient id="person-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <radialGradient id="talent-aura" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.25"/>
      <stop offset="70%" stop-color="#fbbf24" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="screen-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="480" height="360" rx="20" fill="url(#int-bg)"/>

  <!-- Subtle dot grid -->
  <g opacity="0.04">
    <circle cx="30" cy="30" r="1.5" fill="#14b8a6"/><circle cx="70" cy="30" r="1.5" fill="#14b8a6"/>
    <circle cx="110" cy="30" r="1.5" fill="#14b8a6"/><circle cx="150" cy="30" r="1.5" fill="#14b8a6"/>
    <circle cx="190" cy="30" r="1.5" fill="#14b8a6"/><circle cx="230" cy="30" r="1.5" fill="#14b8a6"/>
    <circle cx="270" cy="30" r="1.5" fill="#14b8a6"/><circle cx="310" cy="30" r="1.5" fill="#14b8a6"/>
    <circle cx="350" cy="30" r="1.5" fill="#14b8a6"/><circle cx="390" cy="30" r="1.5" fill="#14b8a6"/>
    <circle cx="430" cy="30" r="1.5" fill="#14b8a6"/><circle cx="30" cy="70" r="1.5" fill="#14b8a6"/>
    <circle cx="70" cy="70" r="1.5" fill="#14b8a6"/><circle cx="110" cy="70" r="1.5" fill="#14b8a6"/>
    <circle cx="430" cy="70" r="1.5" fill="#14b8a6"/><circle cx="30" cy="110" r="1.5" fill="#14b8a6"/>
    <circle cx="430" cy="110" r="1.5" fill="#14b8a6"/><circle cx="450" cy="110" r="1.5" fill="#14b8a6"/>
    <circle cx="30" cy="290" r="1.5" fill="#14b8a6"/><circle cx="70" cy="290" r="1.5" fill="#14b8a6"/>
    <circle cx="430" cy="290" r="1.5" fill="#14b8a6"/><circle cx="30" cy="330" r="1.5" fill="#14b8a6"/>
    <circle cx="70" cy="330" r="1.5" fill="#14b8a6"/><circle cx="110" cy="330" r="1.5" fill="#14b8a6"/>
    <circle cx="350" cy="330" r="1.5" fill="#14b8a6"/><circle cx="390" cy="330" r="1.5" fill="#14b8a6"/>
    <circle cx="430" cy="330" r="1.5" fill="#14b8a6"/>
  </g>

  <!-- Warm talent aura around candidate -->
  <circle cx="155" cy="170" r="85" fill="url(#talent-aura)"/>

  <!-- CANDIDATE PERSON -->
  <g transform="translate(155, 165)">
    <circle cx="0" cy="-20" r="24" fill="url(#person-fill)"/>
    <path d="M-30 18 C-30 0 30 0 30 18 L30 42 Q30 50 22 50 L-22 50 Q-30 50 -30 42Z" fill="url(#person-fill)" opacity="0.9"/>
    <circle cx="-7" cy="-24" r="2.5" fill="#fff" opacity="0.9"/>
    <circle cx="7" cy="-24" r="2.5" fill="#fff" opacity="0.9"/>
    <path d="M-6 -15 Q0 -10 6 -15" stroke="#fff" stroke-width="1.8" fill="none" opacity="0.6" stroke-linecap="round"/>
  </g>

  <!-- Talent star above candidate -->
  <g transform="translate(155, 100)">
    <path d="M0,-14 L3.3,-4.5 L13.3,-4.3 L5.3,1.7 L8.2,11.3 L0,6 L-8.2,11.3 L-5.3,1.7 L-13.3,-4.3 L-3.3,-4.5Z" fill="#fbbf24"/>
    <circle cx="0" cy="0" r="18" fill="#fbbf24" opacity="0.08"/>
  </g>

  <!-- Connection path -->
  <path d="M195 175 C230 175, 240 160, 260 158 C280 156, 290 155, 300 155" stroke="#14b8a6" stroke-width="2" stroke-dasharray="6 4" opacity="0.15"/>
  <circle cx="225" cy="170" r="3" fill="#14b8a6" opacity="0.12"/>
  <circle cx="260" cy="160" r="4" fill="#fbbf24" opacity="0.2"/>
  <circle cx="290" cy="156" r="3" fill="#14b8a6" opacity="0.12"/>

  <!-- Screen glow -->
  <circle cx="365" cy="165" r="80" fill="url(#screen-glow)"/>

  <!-- INTERVIEW SCREEN -->
  <g transform="translate(305, 110)">
    <rect width="120" height="85" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="2"/>
    <rect x="2" y="2" width="116" height="81" rx="10" fill="none" stroke="#14b8a6" stroke-width="0.5" opacity="0.1"/>

    <!-- Waveform -->
    <g transform="translate(16, 20)">
      <rect width="12" height="4" rx="2" fill="#14b8a6" opacity="0.6"/>
      <rect x="0" y="10" width="22" height="4" rx="2" fill="#14b8a6" opacity="0.4"/>
      <rect x="0" y="20" width="16" height="4" rx="2" fill="#14b8a6" opacity="0.5"/>
      <rect x="0" y="30" width="26" height="4" rx="2" fill="#14b8a6" opacity="0.35"/>
      <rect x="0" y="40" width="10" height="4" rx="2" fill="#14b8a6" opacity="0.45"/>
    </g>

    <!-- Handshake icon -->
    <g transform="translate(75, 22)">
      <circle r="20" fill="#f0fdfa"/>
      <circle r="20" stroke="#14b8a6" stroke-width="1" opacity="0.1" fill="none"/>
      <path d="M-10 2 L-3 -3 L2 2 L8 -2" stroke="#14b8a6" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M-10 2 C-12 4 -10 7 -7 5" stroke="#14b8a6" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M8 -2 C10 -4 12 -1 9 1" stroke="#14b8a6" stroke-width="2" fill="none" stroke-linecap="round"/>
    </g>

    <rect x="55" y="52" width="50" height="6" rx="3" fill="#fbbf24" opacity="0.3"/>
    <rect x="60" y="62" width="40" height="4" rx="2" fill="#14b8a6" opacity="0.1"/>

    <!-- Stand -->
    <rect x="48" y="85" width="24" height="14" rx="3" fill="#f3f4f6"/>
    <rect x="38" y="97" width="44" height="5" rx="2.5" fill="#e2e8f0"/>
  </g>

  <!-- Sparkles -->
  <g fill="#fbbf24">
    <path d="M80 80 L82 76 L84 80 L88 82 L84 84 L82 88 L80 84 L76 82Z" opacity="0.3"/>
    <path d="M410 90 L411.5 87 L413 90 L416 91.5 L413 93 L411.5 96 L410 93 L407 91.5Z" opacity="0.25"/>
    <path d="M240 280 L241.5 277 L243 280 L246 281.5 L243 283 L241.5 286 L240 283 L237 281.5Z" opacity="0.2"/>
  </g>
  <g fill="#14b8a6">
    <path d="M440 260 L441 258 L442 260 L444 261 L442 262 L441 264 L440 262 L438 261Z" opacity="0.12"/>
    <path d="M60 300 L61 298 L62 300 L64 301 L62 302 L61 304 L60 302 L58 301Z" opacity="0.12"/>
  </g>

  <!-- Background team silhouettes -->
  <g opacity="0.06" fill="#0d9488">
    <circle cx="45" cy="200" r="8"/><rect x="33" y="212" width="24" height="16" rx="8"/>
    <circle cx="445" cy="210" r="8"/><rect x="433" y="222" width="24" height="16" rx="8"/>
    <circle cx="100" cy="310" r="7"/><rect x="90" y="320" width="20" height="14" rx="7"/>
    <circle cx="390" cy="305" r="7"/><rect x="380" y="315" width="20" height="14" rx="7"/>
  </g>
</svg>
