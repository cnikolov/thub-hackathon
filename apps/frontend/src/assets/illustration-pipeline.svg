<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 300" fill="none">
  <defs>
    <linearGradient id="pl-bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0fdfa"/>
      <stop offset="50%" stop-color="#fefce8"/>
      <stop offset="100%" stop-color="#fffbeb"/>
    </linearGradient>
    <linearGradient id="person-p" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="person-m" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="person-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#115e59"/>
    </linearGradient>
    <radialGradient id="spotlight" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="team-warmth" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="560" height="300" rx="16" fill="url(#pl-bg)"/>

  <!-- Stage labels -->
  <g font-family="'Inter', system-ui, sans-serif" font-weight="700" font-size="12" text-anchor="middle">
    <text x="100" y="32" fill="#14b8a6" opacity="0.5">Discovered</text>
    <text x="280" y="32" fill="#14b8a6" opacity="0.6">Interview</text>
    <text x="460" y="32" fill="#d97706" opacity="0.6">Part of the Team</text>
  </g>

  <!-- Stage dots + connectors -->
  <circle cx="95" cy="36" r="3" fill="#99f6e4" opacity="0.5"/>
  <circle cx="260" cy="36" r="3" fill="#14b8a6" opacity="0.5"/>
  <circle cx="430" cy="36" r="3" fill="#0d9488" opacity="0.5"/>
  <line x1="98" y1="36" x2="257" y2="36" stroke="#14b8a6" stroke-width="1" stroke-dasharray="4 3" opacity="0.2"/>
  <line x1="263" y1="36" x2="427" y2="36" stroke="#0d9488" stroke-width="1" stroke-dasharray="4 3" opacity="0.2"/>

  <!-- Flow arrows -->
  <g stroke="#14b8a6" stroke-width="1.5" opacity="0.12">
    <path d="M160 150 C190 150, 200 150, 210 150" stroke-dasharray="5 4"/>
    <polygon points="212,147 220,150 212,153" fill="#14b8a6" opacity="0.12"/>
    <path d="M350 150 C380 150, 390 150, 400 150" stroke-dasharray="5 4"/>
    <polygon points="402,147 410,150 402,153" fill="#14b8a6" opacity="0.12"/>
  </g>

  <!-- STAGE 1: Discovered -->
  <g transform="translate(100, 130)">
    <circle cx="0" cy="0" r="55" fill="url(#spotlight)"/>
    <circle cx="0" cy="-18" r="18" fill="url(#person-p)"/>
    <path d="M-22 12 C-22 -2 22 -2 22 12 L22 32 Q22 38 16 38 L-16 38 Q-22 38 -22 32Z" fill="url(#person-p)" opacity="0.85"/>
    <circle cx="-5" cy="-21" r="2" fill="#fff" opacity="0.85"/>
    <circle cx="5" cy="-21" r="2" fill="#fff" opacity="0.85"/>
    <path d="M-4 -12 Q0 -9 4 -12" stroke="#fff" stroke-width="1.3" fill="none" opacity="0.5" stroke-linecap="round"/>
  </g>
  <path d="M130 85 L131.5 81 L133 85 L137 86.5 L133 88 L131.5 92 L130 88 L126 86.5Z" fill="#fbbf24" opacity="0.35"/>

  <!-- STAGE 2: Interview -->
  <g transform="translate(280, 125)">
    <circle cx="0" cy="-18" r="20" fill="url(#person-m)"/>
    <path d="M-24 14 C-24 -4 24 -4 24 14 L24 38 Q24 44 18 44 L-18 44 Q-24 44 -24 38Z" fill="url(#person-m)" opacity="0.9"/>
    <circle cx="-6" cy="-22" r="2.2" fill="#fff" opacity="0.9"/>
    <circle cx="6" cy="-22" r="2.2" fill="#fff" opacity="0.9"/>
    <path d="M-5 -11 Q0 -7 5 -11" stroke="#fff" stroke-width="1.5" fill="none" opacity="0.6" stroke-linecap="round"/>
    <!-- Conversation lines -->
    <g transform="translate(32, -15)" opacity="0.25">
      <rect width="20" height="3.5" rx="1.7" fill="#14b8a6"/>
      <rect y="7" width="14" height="3.5" rx="1.7" fill="#14b8a6"/>
      <rect y="14" width="18" height="3.5" rx="1.7" fill="#14b8a6"/>
    </g>
    <g transform="translate(-50, -8)" opacity="0.2">
      <rect width="16" height="3.5" rx="1.7" fill="#fbbf24"/>
      <rect y="7" width="12" height="3.5" rx="1.7" fill="#fbbf24"/>
    </g>
  </g>
  <path d="M310 80 L312 74 L314 80 L320 82 L314 84 L312 90 L310 84 L304 82Z" fill="#fbbf24" opacity="0.3"/>
  <path d="M255 95 L256 92 L257 95 L260 96 L257 97 L256 100 L255 97 L252 96Z" fill="#fbbf24" opacity="0.2"/>

  <!-- STAGE 3: Part of the Team -->
  <g transform="translate(460, 120)">
    <circle cx="0" cy="10" r="70" fill="url(#team-warmth)"/>

    <!-- Main person -->
    <circle cx="0" cy="-18" r="22" fill="url(#person-g)"/>
    <path d="M-26 16 C-26 -4 26 -4 26 16 L26 42 Q26 48 20 48 L-20 48 Q-26 48 -26 42Z" fill="url(#person-g)" opacity="0.92"/>
    <circle cx="-6" cy="-22" r="2.5" fill="#fff" opacity="0.9"/>
    <circle cx="6" cy="-22" r="2.5" fill="#fff" opacity="0.9"/>
    <path d="M-7 -10 Q0 -4 7 -10" stroke="#fff" stroke-width="1.8" fill="none" opacity="0.7" stroke-linecap="round"/>

    <!-- Team members -->
    <g transform="translate(-40, 15)" opacity="0.4">
      <circle cx="0" cy="-10" r="12" fill="#14b8a6"/>
      <path d="M-14 8 C-14 0 14 0 14 8 L14 18 Q14 22 10 22 L-10 22 Q-14 22 -14 18Z" fill="#14b8a6"/>
    </g>
    <g transform="translate(40, 15)" opacity="0.4">
      <circle cx="0" cy="-10" r="12" fill="#14b8a6"/>
      <path d="M-14 8 C-14 0 14 0 14 8 L14 18 Q14 22 10 22 L-10 22 Q-14 22 -14 18Z" fill="#14b8a6"/>
    </g>
    <g transform="translate(-22, -10)" opacity="0.2">
      <circle cx="0" cy="-10" r="10" fill="#14b8a6"/>
      <path d="M-12 6 C-12 -2 12 -2 12 6 L12 14 Q12 18 8 18 L-8 18 Q-12 18 -12 14Z" fill="#14b8a6"/>
    </g>
    <g transform="translate(22, -10)" opacity="0.2">
      <circle cx="0" cy="-10" r="10" fill="#14b8a6"/>
      <path d="M-12 6 C-12 -2 12 -2 12 6 L12 14 Q12 18 8 18 L-8 18 Q-12 18 -12 14Z" fill="#14b8a6"/>
    </g>

    <line x1="-25" y1="15" x2="-8" y2="5" stroke="#14b8a6" stroke-width="1" opacity="0.1"/>
    <line x1="25" y1="15" x2="8" y2="5" stroke="#14b8a6" stroke-width="1" opacity="0.1"/>
  </g>

  <!-- Sparkles -->
  <g fill="#fbbf24">
    <path d="M430 70 L432 64 L434 70 L440 72 L434 74 L432 80 L430 74 L424 72Z" opacity="0.45"/>
    <path d="M490 75 L491.5 71 L493 75 L497 76.5 L493 78 L491.5 82 L490 78 L486 76.5Z" opacity="0.35"/>
    <path d="M505 120 L506 118 L507 120 L509 121 L507 122 L506 124 L505 122 L503 121Z" opacity="0.25"/>
    <path d="M415 105 L416 103 L417 105 L419 106 L417 107 L416 109 L415 107 L413 106Z" opacity="0.25"/>
  </g>

  <!-- Gold star above hired person -->
  <g transform="translate(460, 62)">
    <path d="M0,-12 L2.8,-3.9 L11.3,-3.7 L4.5,1.5 L7,9.6 L0,5.1 L-7,9.6 L-4.5,1.5 L-11.3,-3.7 L-2.8,-3.9Z" fill="#fbbf24"/>
    <circle cx="0" cy="0" r="16" fill="#fbbf24" opacity="0.08"/>
  </g>

  <!-- Ambient -->
  <circle cx="160" cy="160" r="3" fill="#99f6e4" opacity="0.2"/>
  <circle cx="340" cy="80" r="4" fill="#99f6e4" opacity="0.15"/>
  <circle cx="40" cy="200" r="3.5" fill="#99f6e4" opacity="0.15"/>
</svg>
